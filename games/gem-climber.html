<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>GEM Climber | Alpha GEMS</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050510; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Orbitron',sans-serif; color:white; }
    canvas { border:2px solid #7b2fff; border-radius:8px; box-shadow:0 0 40px rgba(123,47,255,0.5); }
    h1 { color:#00d4ff; margin-bottom:10px; font-size:1.5rem; }
    #sc2 { color:#ffd700; margin-bottom:10px; }
    a.back { margin-top:20px; color:#00d4ff; text-decoration:none; font-size:0.9rem; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
</head>
<body>
  <h1>🏔️ GEM CLIMBER</h1>
  <div id="sc2">Height: 0</div>
  <canvas id="c" width="360" height="520"></canvas>
  <a class="back" href="../index.html">← Back</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const scEl = document.getElementById('sc2');

const LABELS = ['Presale 🎯','WL ✅','100x 🚀','Alpha 💎','Moon 🌕','GEM ✊'];
let player, platforms, camY, score, vy, gameOver, keys2;

function init3() {
  camY = 0; score = 0; gameOver = false; vy = 0;
  player = { x: W/2 - 14, y: H - 100, w: 28, h: 28 };
  keys2 = {};
  platforms = [];
  // Generate starting platforms
  platforms.push({ x: W/2 - 40, y: H - 60, w: 80 });
  for (let i = 0; i < 12; i++) genPlatform(H - 60 - (i+1)*60);
  loop3();
}

function genPlatform(y) {
  platforms.push({
    x: Math.random() * (W - 90) + 10,
    y,
    w: 60 + Math.random() * 40,
    label: LABELS[Math.floor(Math.random()*LABELS.length)]
  });
}

document.addEventListener('keydown', e => keys2[e.key] = true);
document.addEventListener('keyup', e => keys2[e.key] = false);
canvas.addEventListener('click', e => { if (gameOver) init3(); });

function loop3() {
  ctx.clearRect(0, 0, W, H);
  // bg gradient
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#050510'); g.addColorStop(1,'#0d0525');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  if (!gameOver) {
    if (keys2['ArrowLeft']||keys2['a']) player.x -= 4;
    if (keys2['ArrowRight']||keys2['d']) player.x += 4;
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    vy += 0.45; // gravity
    player.y += vy;

    // Platform collision (only when falling)
    if (vy > 0) {
      platforms.forEach(p => {
        const py = p.y - camY;
        if (player.y + player.h > py && player.y + player.h < py + 18 &&
            player.x + player.w > p.x && player.x < p.x + p.w) {
          vy = -11;
          const height = Math.floor((H - p.y) / 60);
          if (height > score) { score = height; scEl.textContent = 'Height: ' + score; }
        }
      });
    }

    // Camera follow
    if (player.y - camY < H * 0.4) {
      const diff = H * 0.4 - (player.y - camY);
      camY -= diff;
      // gen more platforms
      const topY = platforms[platforms.length-1].y;
      if (topY > camY - 60) genPlatform(topY - 60);
    }

    // Fall off bottom
    if (player.y - camY > H + 50) { gameOver = true; }
    // Wrap sides
    if (player.x > W) player.x = 0;
    if (player.x < -player.w) player.x = W;
  }

  // Draw platforms
  platforms.forEach(p => {
    const py = p.y - camY;
    if (py < -20 || py > H + 20) return;
    ctx.fillStyle = '#7b2fff';
    ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 10;
    ctx.fillRect(p.x, py, p.w, 12);
    ctx.shadowBlur = 0;
    if (p.label) {
      ctx.font = '9px Orbitron';
      ctx.fillStyle = '#00d4ff';
      ctx.fillText(p.label, p.x + 2, py - 4);
    }
  });

  // Draw player
  ctx.font = '26px serif';
  ctx.fillText('💎', player.x, player.y - camY + 26);

  if (gameOver) {
    ctx.fillStyle = 'rgba(5,5,16,0.85)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 26px Orbitron'; ctx.fillStyle = '#ff6fff';
    ctx.fillText('PAPER HANDS 📉', W/2, H/2-30);
    ctx.font = '16px Orbitron'; ctx.fillStyle = '#ffd700';
    ctx.fillText('Height: ' + score, W/2, H/2+10);
    ctx.font = '13px Orbitron'; ctx.fillStyle = '#9090cc';
    ctx.fillText('Click to retry', W/2, H/2+50);
    ctx.textAlign = 'left';
  }

  requestAnimationFrame(loop3);
}

init3();
</script>
</body>
</html>
